# Base config with shared defaults
enemies: ["WeightedRandom", "WeightedRandom", "WeightedRandom"]
vps_to_win: 10

reward_type: "sparse"
pbrs_lambda: 1.0
pbrs_normalize: true

net_arch: [256, 256]
learning_rate: 3e-4
n_steps: 2048
batch_size: 64
n_epochs: 10
gamma: 0.999
ent_coef: 0.01

total_timesteps: 1_000_000
save_path: "models/default"
tb_log: "logs/default"
log_freq: 10_000

eval_games: 500
eval_deterministic: true
