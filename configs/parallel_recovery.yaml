# Parallel Recovery: Resuming from Step 600,000 with 16x concurrency
n_envs: 16
vps_to_win: 10
structured_encoder: True
features_dim: 256
self_play: True
self_play_freq: 50000
self_play_dir: "/storage/models/snapshots_parallel"

# Same stable hyperparams as previous recovery run
learning_rate: 0.0001 
ent_coef: 0.08        

# Reward Shaping for denser feedback signal
reward_type: pbrs
pbrs_lambda: 1.0
pbrs_phi_cap: 10.0

load_path: "/storage/storage/models/snapshots_parallel/snapshot_1600000"

curriculum:
  - timesteps: 1400000  # Remaining time in Stage 3 (2M total - 600k done)
    enemies: ["Self", "ValueFunction", "WeightedRandom"]
  - timesteps: 2000000
    enemies: ["Self", "AlphaBeta", "WeightedRandom"]

save_path: "models/parallel_recovery"
tb_log: "logs/parallel_recovery"
