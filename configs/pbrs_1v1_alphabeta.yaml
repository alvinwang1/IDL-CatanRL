# PBRS reward shaping, 1v1 training vs WeightedRandom, eval vs AlphaBeta
# NOTE: Train against WeightedRandom (fast), then evaluate against AlphaBeta
enemies: ["WeightedRandom"]
reward_type: "pbrs"
pbrs_lambda: 1.0
pbrs_normalize: true

net_arch: [256, 256]
learning_rate: 3e-4
n_steps: 2048
batch_size: 64
n_epochs: 10
gamma: 0.999
ent_coef: 0.01

total_timesteps: 5_000_000
save_path: "models/pbrs_1v1"
tb_log: "logs/pbrs_1v1"

# Evaluation against AlphaBeta uses Game API (slow, fewer games)
eval_games: 100
