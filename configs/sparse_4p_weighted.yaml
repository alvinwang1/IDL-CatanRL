# Reproduces the original baseline: sparse reward, 4p vs WeightedRandom
enemies: ["WeightedRandom", "WeightedRandom", "WeightedRandom"]
reward_type: "sparse"

net_arch: [256, 256]
learning_rate: 3e-4
n_steps: 2048
batch_size: 64
n_epochs: 10
gamma: 0.999
ent_coef: 0.01

total_timesteps: 1_000_000
save_path: "models/sparse_4p_weighted"
tb_log: "logs/sparse_4p_weighted"
