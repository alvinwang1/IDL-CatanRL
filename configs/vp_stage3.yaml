# Fine-tune from vp_ablation_stage2 for 20M steps against:
#   - 1 frozen copy of itself (PPO)
#   - 2 VictoryPoint search bots
#
# Run:
#   python -m catanrl.train --config configs/vp_stage3.yaml

reward_type: "pbrs"
pbrs_lambda: 1.0
pbrs_normalize: true
pbrs_phi_cap: 3.0

net_arch: [256, 256]
learning_rate: 5e-5         # lower LR for long fine-tune
lr_schedule: "linear"
n_steps: 2048
batch_size: 64
n_epochs: 10
gamma: 0.999
ent_coef: 0.01

total_timesteps: 20_000_000

save_path: "models/vp_stage3"
tb_log:    "logs/vp_stage3"
log_freq:  10_000

resume_from: "vp_ablation_stage2"

enemies:
  - "PPO:vp_ablation_stage2"
  - "VictoryPoint"
  - "VictoryPoint"
