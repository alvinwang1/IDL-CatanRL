# Fine-tune from vp_ablation_stage2 for 20M steps against:
#   - 2 frozen copies of itself (PPO)
#   - 1 ValueFunction heuristic bot
#
# Run:
#   python -m catanrl.train --config configs/vp_vs_valuefn.yaml

reward_type: "pbrs"
pbrs_lambda: 0.5
pbrs_normalize: true
pbrs_phi_cap: 4.0

net_arch: [256, 256]
learning_rate: 5e-5
lr_schedule: "linear"
n_steps: 2048
batch_size: 64
n_epochs: 10
gamma: 0.999
ent_coef: 0.01

total_timesteps: 20_000_000
checkpoint_freq: 2_000_000

save_path: "models/vp_vs_valuefn"
tb_log:    "logs/vp_vs_valuefn"
log_freq:  10_000

resume_from: "vp_ablation_stage2"

enemies:
  - "PPO:vp_ablation_stage2"
  - "PPO:vp_ablation_stage2"
  - "ValueFunction"
